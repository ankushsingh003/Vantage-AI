<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Consultancy Report: {{ company_name }}</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; line-height: 1.6; margin: 40px; }
        h1 { color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h2 { color: #2b6cb0; margin-top: 30px; }
        .header { text-align: center; margin-bottom: 50px; }
        .logo { font-size: 24px; font-weight: bold; color: #e53e3e; }
        .content { margin-top: 20px; }
        .footer { position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 10px; color: #718096; border-top: 1px solid #e2e8f0; padding-top: 10px; }
        .markdown-body { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Strategic Intelligence Partners</div>
        <h1>Market Analysis & Consultancy Report</h1>
        <h2>{{ company_name }} - {{ industry }} Sector</h2>
        <p>Prepared on: {{ date }}</p>
    </div>

    <div class="content markdown-body">
        <!-- The markdown from Claude will be converted to HTML and injected here -->
        {{ report_html | safe }}
    </div>

    <div class="footer">
        Generated by Strategy Engine AI | Confidential Document
    </div>
</body>
</html>
